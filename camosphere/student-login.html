<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Login - Camosphere</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/global.css"/>
  <link rel="stylesheet" href="css/login.css?v=password-eye-1"/>
</head>
<body>
  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-logo">
      <span class="logo-text">CAMOSPHERE</span>
      <span class="logo-sub">LIT SARIGAM</span>
    </div>
    <nav class="sidebar-nav">
      <ul>
        <li><a href="index.html"        class="nav-btn"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a></li>
        <li><a href="virtual-tour.html" class="nav-btn"><span class="nav-icon">🥽</span><span class="nav-label">Virtual Tour</span></a></li>
        <li><a href="departments.html"  class="nav-btn"><span class="nav-icon">🏛️</span><span class="nav-label">Departments</span></a></li>
        <li><a href="campus-map.html"   class="nav-btn"><span class="nav-icon">🗺️</span><span class="nav-label">Campus Map</span></a></li>
        <li><a href="events.html"       class="nav-btn"><span class="nav-icon">📅</span><span class="nav-label">Event Calendar</span></a></li>
        <li><a href="gauva-ai.html"     class="nav-btn"><span class="nav-icon">🤖</span><span class="nav-label">Gauva AI</span></a></li>
      </ul>
    </nav>
    <div class="sidebar-footer"><p>© 2026</p><p>Developed by Shreya Rai </p></div>
  </aside>
  <main id="main-content">
    <div class="login-page">
      <div class="login-box" data-role="student">
        <h2 class="login-heading">🎓 Student Portal</h2>
        <div id="mode-btns" class="mode-btns">
          <button class="btn btn-cyan mode-btn" data-mode="new">New Student</button>
          <button class="btn btn-cyan mode-btn" data-mode="existing">Existing Student</button>
        </div>
        <form id="register-form" class="login-form hidden">
          <h3 class="form-subtitle">New Student Registration</h3>
          <div class="form-group"><label>Name</label><input type="text" name="name" placeholder="Enter your name" required/></div>
          <div class="form-group"><label>Course</label>
            <select name="course" required>
              <option value="">Select Course</option>
              <option value="diploma">Diploma</option>
              <option value="degree">Degree</option>
            </select>
          </div>
          <div class="form-group"><label>Branch</label><input type="text" name="branch" placeholder="e.g. Computer Science" required/></div>
          <div class="form-group"><label>Semester</label>
            <select name="semester" required>
              <option value="">Select Semester</option>
              <option>1</option><option>2</option><option>3</option><option>4</option>
              <option>5</option><option>6</option><option>7</option><option>8</option>
            </select>
          </div>
          <div id="register-msg" class="msg hidden"></div>
          <button type="submit" class="btn btn-cyan btn-full">Register</button>
        </form>
        <form id="login-form" class="login-form hidden">
          <h3 class="form-subtitle">Existing Student Login</h3>
          <div class="form-group"><label>Enrollment Number</label><input type="text" name="identifier" placeholder="Enter enrollment number" required/></div>
          <div class="form-group"><label>Password</label><input type="password" name="password" placeholder="Enter password" required/></div>
          <div id="login-msg" class="msg hidden"></div>
          <button type="submit" class="btn btn-cyan btn-full">Login</button>
        </form>
        <a href="index.html" class="back-btn">← Back to Home</a>
      </div>
    </div>
  </main>
  <script src="js/global.js?v=uniform-nav-4"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/login.js?v=password-eye-1"></script>
</body>
</html>
