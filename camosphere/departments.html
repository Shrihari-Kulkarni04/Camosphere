<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Departments - Camosphere</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/global.css"/>
  <link rel="stylesheet" href="css/departments.css?v=faculty-ui-4"/>
</head>
<body>
  <aside id="sidebar">
    <div class="sidebar-logo"><span class="logo-text">CAMO<br/>SPHERE</span><span class="logo-sub">LIT SARIGAM</span></div>
    <nav class="sidebar-nav"><ul>
      <li><a href="index.html"        class="nav-btn"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a></li>
      <li><a href="virtual-tour.html" class="nav-btn"><span class="nav-icon">🥽</span><span class="nav-label">Virtual Tour</span></a></li>
      <li><a href="departments.html"  class="nav-btn"><span class="nav-icon">🏛️</span><span class="nav-label">Departments</span></a></li>
      <li><a href="campus-map.html"   class="nav-btn"><span class="nav-icon">🗺️</span><span class="nav-label">Campus Map</span></a></li>
      <li><a href="events.html"       class="nav-btn"><span class="nav-icon">📅</span><span class="nav-label">Event Calendar</span></a></li>
      <li><a href="gauva-ai.html"     class="nav-btn"><span class="nav-icon">🤖</span><span class="nav-label">Gauva AI</span></a></li>
    </ul></nav>
    <div class="sidebar-footer"><p>© 2026</p><p>developed by Shreya Rai</p></div>
  </aside>
  <main id="main-content">
    <div class="dept-page">

      <!-- View 1: Program Selection -->
      <div id="view-programs">
        <h2 class="page-heading">Choose a Program</h2>
        <div class="program-grid">
          <button class="program-card" data-program="BE"><span class="prog-short">BE</span><span class="prog-full">Bachelor of Engineering</span></button>
          <button class="program-card" data-program="DE"><span class="prog-short">DE</span><span class="prog-full">Diploma in Engineering</span></button>
          <button class="program-card" data-program="BVoc"><span class="prog-short">BVoc</span><span class="prog-full">Bachelor of Vocation</span></button>
          <button class="program-card" data-program="DVoc"><span class="prog-short">DVoc</span><span class="prog-full">Diploma of Vocation</span></button>
        </div>
      </div>

      <!-- View 2: Branch Selection -->
      <div id="view-branches" class="hidden">
        <button class="back-btn" id="back-to-programs">← Back to Programs</button>
        <h2 class="page-heading" id="branch-heading"></h2>
        <p class="dept-subheading" id="branch-subheading"></p>
        <div class="branch-grid" id="branch-grid"></div>
      </div>

      <!-- View 3: Branch Detail -->
      <div id="view-detail" class="hidden">
        <button class="back-btn" id="back-to-branches">← Back to Branches</button>
        <div class="card branch-detail">
          <h2 class="branch-detail-title" id="detail-title"></h2>
          <p class="branch-detail-desc" id="detail-desc"></p>
          <div class="detail-actions" id="detail-actions"></div>
          <div class="detail-panel" id="detail-panel"></div>
        </div>
      </div>

    </div>
  </main>
  <script src="js/global.js?v=uniform-nav-4"></script>
  <script src="js/supabase-config.js?v=faculty-ui-4"></script>
  <script src="js/departments.js?v=faculty-ui-4"></script>
</body>
</html>
