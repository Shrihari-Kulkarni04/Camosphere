<!-- ===== MAIN ===== -->
<main id="main-content">

<div class="map-page">

<h2 class="page-heading">Campus Map (2D)</h2>

<div class="map-layout">

<!-- LEFT BUTTON LIST -->
<div class="map-list">

<button class="map-list-btn active" data-key="A-0">Block A - Floor 0</button>
<button class="map-list-btn" data-key="A-1">Block A – Floor 1</button>
<button class="map-list-btn" data-key="A-2">Block A – Floor 2</button>

<button class="map-list-btn" data-key="B-0">Block B – Floor 0</button>
<button class="map-list-btn" data-key="B-1">Block B – Floor 1</button>
<button class="map-list-btn" data-key="B-2">Block B – Floor 2</button>

<button class="map-list-btn" data-key="C-0">Block C – Floor 0</button>
<button class="map-list-btn" data-key="C-1">Block C – Floor 1</button>
<button class="map-list-btn" data-key="C-2">Block C – Floor 2</button>

<button class="map-list-btn" data-key="D-0">Block D – Floor 0</button>
<button class="map-list-btn" data-key="D-1">Block D – Floor 1</button>
<button class="map-list-btn" data-key="D-2">Block D – Floor 2</button>

</div>

<!-- RIGHT MAP DISPLAY -->
<div class="map-display">

<h3 class="map-display-title" id="map-title">
Block A – Floor 0
</h3>

<div class="map-img-wrapper">

<!-- 🔥 SVG WILL LOAD HERE -->
<div id="map-container" class="map-img"></div>

<!-- FALLBACK -->
<div id="map-fallback" class="map-fallback" style="display:none;">
  <span>🗺️</span>
  <p id="map-fallback-label">Block A – Floor 0</p>
  <small>Map not available</small>
</div>

</div>

</div>

</div>

</div>
